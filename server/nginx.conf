worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen       8080;
        server_name  localhost;

        location /hls/ {
            # Update this path to match your config.OUTPUT_DIR
            alias C:/Users/Carlos/Code/projects/video-cdn-pipeline/.local/processed/;

            add_header Cache-Control no-cache;
            add_header 'Access-Control-Allow-Origin' '*';

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }
    }
}